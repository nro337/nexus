name: Fuzzing

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    # Run weekly on Sunday at 03:00 UTC
    - cron: '0 3 * * 0'

permissions:
  contents: read

jobs:
  fuzz:
    name: Run fuzz tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build fuzz targets
        run: |
          mkdir -p fuzz/dist
          for target in fuzz/*.fuzz.ts; do
            out="fuzz/dist/$(basename "$target" .ts).js"
            npx esbuild "$target" \
              --bundle \
              --platform=node \
              --format=esm \
              --external:"@jazzer.js/*" \
              --external:@babel/preset-typescript \
              --outfile="$out"
          done

      - name: Run fuzz targets (time-limited)
        run: |
          for target in fuzz/dist/*.fuzz.js; do
            echo "Fuzzing $target for 30 seconds..."
            npx jazzer "$target" -- -max_total_time=30 -timeout=10
          done
