name: Fuzzing

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    # Run weekly on Sunday at 03:00 UTC
    - cron: '0 3 * * 0'

permissions:
  contents: read

jobs:
  fuzz:
    name: Run fuzz tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run property-based fuzz tests
        run: npx vitest run fuzz/
