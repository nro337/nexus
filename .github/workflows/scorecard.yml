name: OpenSSF Scorecard

on:
  push:
    branches: [main]
  schedule:
    # Run daily at 06:00 UTC
    - cron: '0 6 * * *'

permissions: read-all

jobs:
  scorecard:
    name: Scorecard analysis
    runs-on: ubuntu-latest
    permissions:
      security-events: write
      contents: read
      actions: read
      id-token: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Run Scorecard analysis
        uses: ossf/scorecard-action@v2.4.3
        with:
          results_file: results.sarif
          results_format: sarif
          publish_results: false
          # SCORECARD_TOKEN must be a GitHub Personal Access Token (classic) with
          # the 'repo' scope, stored as a repository secret. The default GITHUB_TOKEN
          # cannot access the GraphQL API for private repositories, causing the
          # "Resource not accessible by integration" error.
          repo_token: ${{ secrets.SCORECARD_TOKEN }}

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: SARIF file
          path: results.sarif
          retention-days: 7

      - name: Upload to code-scanning
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: results.sarif
