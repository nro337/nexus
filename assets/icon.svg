      <circle cx="120" cy="300" r="1.2"/><circle cx="150" cy="300" r="1.2"/><circle cx="180" cy="300" r="1.2"/>
      <circle cx="210" cy="300" r="1.2"/><circle cx="240" cy="300" r="1.2"/><circle cx="270" cy="300" r="1.2"/>
      <circle cx="300" cy="300" r="1.2"/><circle cx="330" cy="300" r="1.2"/><circle cx="360" cy="300" r="1.2"/>
      <circle cx="390" cy="300" r="1.2"/><circle cx="420" cy="300" r="1.2"/><circle cx="450" cy="300" r="1.2"/>
      <circle cx="480" cy="300" r="1.2"/>
      <circle cx="30" cy="330" r="1.2"/><circle cx="60" cy="330" r="1.2"/><circle cx="90" cy="330" r="1.2"/>
