      <circle cx="210" cy="330" r="1.2"/><circle cx="240" cy="330" r="1.2"/><circle cx="270" cy="330" r="1.2"/>
      <circle cx="300" cy="330" r="1.2"/><circle cx="330" cy="330" r="1.2"/><circle cx="360" cy="330" r="1.2"/>
      <circle cx="390" cy="330" r="1.2"/><circle cx="420" cy="330" r="1.2"/><circle cx="450" cy="330" r="1.2"/>
      <circle cx="480" cy="330" r="1.2"/>
      <circle cx="30" cy="360" r="1.2"/><circle cx="60" cy="360" r="1.2"/><circle cx="90" cy="360" r="1.2"/>
      <circle cx="120" cy="360" r="1.2"/><circle cx="150" cy="360" r="1.2"/><circle cx="180" cy="360" r="1.2"/>
      <circle cx="210" cy="360" r="1.2"/><circle cx="240" cy="360" r="1.2"/><circle cx="270" cy="360" r="1.2"/>
      <circle cx="300" cy="360" r="1.2"/><circle cx="330" cy="360" r="1.2"/><circle cx="360" cy="360" r="1.2"/>
      <circle cx="390" cy="360" r="1.2"/><circle cx="420" cy="360" r="1.2"/><circle cx="450" cy="360" r="1.2"/>
      <circle cx="480" cy="360" r="1.2"/>
      <circle cx="30" cy="390" r="1.2"/><circle cx="60" cy="390" r="1.2"/><circle cx="90" cy="390" r="1.2"/>
      <circle cx="120" cy="390" r="1.2"/><circle cx="150" cy="390" r="1.2"/><circle cx="180" cy="390" r="1.2"/>
      <circle cx="210" cy="390" r="1.2"/><circle cx="240" cy="390" r="1.2"/><circle cx="270" cy="390" r="1.2"/>
      <circle cx="300" cy="390" r="1.2"/><circle cx="330" cy="390" r="1.2"/><circle cx="360" cy="390" r="1.2"/>
      <circle cx="390" cy="390" r="1.2"/><circle cx="420" cy="390" r="1.2"/><circle cx="450" cy="390" r="1.2"/>
