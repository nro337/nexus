      <circle cx="300" cy="420" r="1.2"/><circle cx="330" cy="420" r="1.2"/><circle cx="360" cy="420" r="1.2"/>
      <circle cx="390" cy="420" r="1.2"/><circle cx="420" cy="420" r="1.2"/><circle cx="450" cy="420" r="1.2"/>
