      <circle cx="300" cy="480" r="1.2"/><circle cx="330" cy="480" r="1.2"/><circle cx="360" cy="480" r="1.2"/>
      <circle cx="390" cy="480" r="1.2"/><circle cx="420" cy="480" r="1.2"/><circle cx="450" cy="480" r="1.2"/>
      <circle cx="480" cy="480" r="1.2"/>
    </g>
  </g>

  <!--
    Graph layout (centered at 256,256):
    Hub:  (256, 256)  r=48  #6c8cff
    N1:   (160, 160)  r=26  #60a5fa
    N2:   (160, 352)  r=24  #34d399
    N3:   (352, 155)  r=22  #a78bfa
    N4:   (352, 357)  r=26  #f59e0b
    N5:   (100, 256)  r=18  #fb7185
    N6:   (256, 96)   r=18  #6c8cff
    N7:   (256, 416)  r=18  #60a5fa
    N8:   (412, 180)  r=16  #a78bfa
    N9:   (412, 332)  r=16  #34d399
  -->

  <!-- Edges -->
  <g stroke="#252a3a" stroke-width="1.8" opacity="0.75">
    <!-- Hub to Ring 1 -->
    <line x1="256" y1="256" x2="160" y2="160"/>
    <line x1="256" y1="256" x2="160" y2="352"/>
    <line x1="256" y1="256" x2="352" y2="155"/>
    <line x1="256" y1="256" x2="352" y2="357"/>
    <!-- Hub to Ring 2 -->
    <line x1="256" y1="256" x2="100" y2="256"/>
    <line x1="256" y1="256" x2="256" y2="96"/>
    <line x1="256" y1="256" x2="256" y2="416"/>
    <!-- Ring 1 to Ring 2 -->
    <line x1="160" y1="160" x2="100" y2="256"/>
    <line x1="160" y1="160" x2="256" y2="96"/>
    <line x1="160" y1="352" x2="100" y2="256"/>
    <line x1="160" y1="352" x2="256" y2="416"/>
    <line x1="352" y1="155" x2="256" y2="96"/>
    <line x1="352" y1="155" x2="412" y2="180"/>
    <line x1="352" y1="357" x2="256" y2="416"/>
    <line x1="352" y1="357" x2="412" y2="332"/>
    <!-- Ring 1 cross -->
    <line x1="160" y1="160" x2="352" y2="155"/>
    <line x1="160" y1="352" x2="352" y2="357"/>
    <!-- Ring 2 outer -->
    <line x1="412" y1="180" x2="412" y2="332"/>
  </g>

  <!-- Hub soft aura -->
  <circle cx="256" cy="256" r="110" fill="url(#hubAura)"/>

  <!-- Hub outer ring decoration -->
  <circle cx="256" cy="256" r="60" fill="none" stroke="#6c8cff" stroke-width="1" opacity="0.2"/>

  <!-- Ring 1 nodes -->
  <circle cx="160" cy="160" r="26" fill="#60a5fa" filter="url(#nodeGlow)"/>
  <circle cx="160" cy="160" r="26" fill="#60a5fa"/>

  <circle cx="160" cy="352" r="24" fill="#34d399" filter="url(#nodeGlow)"/>
  <circle cx="160" cy="352" r="24" fill="#34d399"/>

  <circle cx="352" cy="155" r="22" fill="#a78bfa" filter="url(#nodeGlow)"/>
  <circle cx="352" cy="155" r="22" fill="#a78bfa"/>

  <circle cx="352" cy="357" r="26" fill="#f59e0b" filter="url(#nodeGlow)"/>
  <circle cx="352" cy="357" r="26" fill="#f59e0b"/>

  <!-- Ring 2 nodes -->
  <circle cx="100" cy="256" r="18" fill="#fb7185" filter="url(#nodeGlow)"/>
  <circle cx="100" cy="256" r="18" fill="#fb7185"/>

  <circle cx="256" cy="96" r="18" fill="#6c8cff" filter="url(#nodeGlow)"/>
  <circle cx="256" cy="96" r="18" fill="#6c8cff"/>

  <circle cx="256" cy="416" r="18" fill="#60a5fa" filter="url(#nodeGlow)"/>
  <circle cx="256" cy="416" r="18" fill="#60a5fa"/>

  <circle cx="412" cy="180" r="16" fill="#a78bfa" filter="url(#nodeGlow)"/>
  <circle cx="412" cy="180" r="16" fill="#a78bfa"/>

  <circle cx="412" cy="332" r="16" fill="#34d399" filter="url(#nodeGlow)"/>
  <circle cx="412" cy="332" r="16" fill="#34d399"/>

  <!-- Hub (drawn on top) -->
  <circle cx="256" cy="256" r="48" fill="url(#hubGrad)" filter="url(#hubGlow)"/>
  <circle cx="256" cy="256" r="48" fill="url(#hubGrad)"/>
  <!-- Hub inner highlight -->
  <circle cx="244" cy="244" r="16" fill="white" opacity="0.12"/>

  <!-- N lettermark in hub -->
  <text x="256" y="270"
        text-anchor="middle"
        font-family="ui-sans-serif, system-ui, -apple-system, sans-serif"
        font-size="42" font-weight="800"
        fill="white" opacity="0.95">N</text>

</svg>
