<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <!-- Background gradient -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0c0e14"/>
      <stop offset="100%" stop-color="#0f1220"/>
    </linearGradient>

    <!-- Hub gradient -->
    <radialGradient id="hubGrad" cx="40%" cy="35%" r="60%">
      <stop offset="0%" stop-color="#8aa3ff"/>
      <stop offset="100%" stop-color="#6c8cff"/>
    </radialGradient>

    <!-- Hub aura -->
    <radialGradient id="hubAura" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#6c8cff" stop-opacity="0.25"/>
      <stop offset="100%" stop-color="#6c8cff" stop-opacity="0"/>
    </radialGradient>

    <!-- Outer ring gradient -->
    <linearGradient id="ringGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#6c8cff" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#a78bfa" stop-opacity="0.1"/>
    </linearGradient>

    <!-- Node glow -->
    <filter id="nodeGlow" x="-80%" y="-80%" width="260%" height="260%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <!-- Hub glow -->
    <filter id="hubGlow" x="-120%" y="-120%" width="340%" height="340%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="14" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <!-- Outer ring glow -->
    <filter id="ringGlow" x="-10%" y="-10%" width="120%" height="120%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="2" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <!-- Clip to rounded square -->
    <clipPath id="roundedSquare">
      <rect width="512" height="512" rx="96" ry="96"/>
    </clipPath>
  </defs>

  <!-- Rounded square background -->
  <rect width="512" height="512" rx="96" ry="96" fill="url(#bgGrad)"/>

  <!-- Subtle dot grid (clipped) -->
  <g clip-path="url(#roundedSquare)">
    <!-- Dot pattern via small circles -->
    <g fill="#252a3a" opacity="0.5">
      <!-- Row pattern: 30px spacing -->
      <circle cx="30" cy="30" r="1.2"/><circle cx="60" cy="30" r="1.2"/><circle cx="90" cy="30" r="1.2"/>
      <circle cx="120" cy="30" r="1.2"/><circle cx="150" cy="30" r="1.2"/><circle cx="180" cy="30" r="1.2"/>
      <circle cx="210" cy="30" r="1.2"/><circle cx="240" cy="30" r="1.2"/><circle cx="270" cy="30" r="1.2"/>
      <circle cx="300" cy="30" r="1.2"/><circle cx="330" cy="30" r="1.2"/><circle cx="360" cy="30" r="1.2"/>
      <circle cx="390" cy="30" r="1.2"/><circle cx="420" cy="30" r="1.2"/><circle cx="450" cy="30" r="1.2"/>
      <circle cx="480" cy="30" r="1.2"/>
      <circle cx="30" cy="60" r="1.2"/><circle cx="60" cy="60" r="1.2"/><circle cx="90" cy="60" r="1.2"/>
      <circle cx="120" cy="60" r="1.2"/><circle cx="150" cy="60" r="1.2"/><circle cx="180" cy="60" r="1.2"/>
