      <circle cx="300" cy="240" r="1.2"/><circle cx="330" cy="240" r="1.2"/><circle cx="360" cy="240" r="1.2"/>
      <circle cx="390" cy="240" r="1.2"/><circle cx="420" cy="240" r="1.2"/><circle cx="450" cy="240" r="1.2"/>
