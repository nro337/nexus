      <circle cx="30" cy="270" r="1.2"/><circle cx="60" cy="270" r="1.2"/><circle cx="90" cy="270" r="1.2"/>
      <circle cx="120" cy="270" r="1.2"/><circle cx="150" cy="270" r="1.2"/><circle cx="180" cy="270" r="1.2"/>
      <circle cx="210" cy="270" r="1.2"/><circle cx="240" cy="270" r="1.2"/><circle cx="270" cy="270" r="1.2"/>
      <circle cx="300" cy="270" r="1.2"/><circle cx="330" cy="270" r="1.2"/><circle cx="360" cy="270" r="1.2"/>
