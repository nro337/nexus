      <circle cx="390" cy="60" r="1.2"/><circle cx="420" cy="60" r="1.2"/><circle cx="450" cy="60" r="1.2"/>
      <circle cx="480" cy="60" r="1.2"/>
      <circle cx="30" cy="90" r="1.2"/><circle cx="60" cy="90" r="1.2"/><circle cx="90" cy="90" r="1.2"/>
      <circle cx="120" cy="90" r="1.2"/><circle cx="150" cy="90" r="1.2"/><circle cx="180" cy="90" r="1.2"/>
      <circle cx="210" cy="90" r="1.2"/><circle cx="240" cy="90" r="1.2"/><circle cx="270" cy="90" r="1.2"/>
      <circle cx="300" cy="90" r="1.2"/><circle cx="330" cy="90" r="1.2"/><circle cx="360" cy="90" r="1.2"/>
      <circle cx="390" cy="90" r="1.2"/><circle cx="420" cy="90" r="1.2"/><circle cx="450" cy="90" r="1.2"/>
